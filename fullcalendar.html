<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>FullCalendar RRule Test</title>

  <!-- FullCalendar CSS -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

  <!-- RRule & FullCalendar JS -->
  <script src="https://cdn.jsdelivr.net/npm/rrule@2.7.1/dist/es5/rrule.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/rrule@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  <style>
    body { font-family: Arial; margin: 40px; }
    #calendar { max-width: 600px; margin: 0 auto; }
  </style>
</head>
<body>

<div id="calendar"></div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  const calendarEl = document.getElementById('calendar');

  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: ''
    },
    plugins: ['rrule'],

    events: [
      {
        title: '每週一循環事件',
        rrule: {
          freq: 'weekly',
          dtstart: new Date().toISOString().split('T')[0], // 今天
          count: 4, // 重複 4 次
          byweekday: RRule.MO
        }
      }
    ]
  });

  calendar.render();
});
</script>

</body>
</html>
