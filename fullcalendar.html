<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>FullCalendar Stable</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>
#calendar {
  max-width: 900px;
  margin: 40px auto;
}

#modal {
  display: none;
  position: fixed;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 20px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<button onclick="openModal()">新增循環事件</button>

<div id="calendar"></div>

<!-- Modal -->
<div id="modal">
  <h3>新增循環事件</h3>
  日期: <input type="date" id="date"><br><br>
  開始時間: <input type="time" id="start"><br><br>
  結束時間: <input type="time" id="end"><br><br>
  <button onclick="submitEvent()">送出</button>
  <button onclick="closeModal()">取消</button>
</div>

<script>
const API_URL = "你的WebApp網址"; // ⭐ 改這裡

let calendar;

document.addEventListener('DOMContentLoaded', function() {

  calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'dayGridMonth',

    eventClick: function(info) {
      let newTitle = prompt("修改名稱", info.event.title);
      if (newTitle) {
        info.event.setProp('title', newTitle);

        fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            action: "update",
            id: info.event.id,
            title: newTitle
          })
        });
      }
    }
  });

  calendar.render();
  loadEvents();
});

function loadEvents() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {
      data.forEach(ev => calendar.addEvent(ev));
    });
}

function openModal() {
  document.getElementById("modal").style.display = "block";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function submitEvent() {

  const date = document.getElementById("date").value;
  const startTime = document.getElementById("start").value;
  const endTime = document.getElementById("end").value;

  if (!date || !startTime || !endTime) {
    alert("請填完整資料");
    return;
  }

  let events = [];
  let baseDate = new Date(date);

  for (let i = 0; i < 12; i++) {

    let d = new Date(baseDate);
    d.setDate(d.getDate() + i * 7);

    let day = d.toISOString().split('T')[0];

    let start = day + "T" + startTime;
    let end = day + "T" + endTime;

    let id = Date.now() + "_" + i;

    let ev = {
      id: id,
      title: "循環事件",
      start: start,
      end: end
    };

    events.push(ev);
    calendar.addEvent(ev);
  }

  // ⭐ 關鍵修正：確保一次正確送出
  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      action: "add",
      events: events
    })
  })
  .then(res => res.text())
  .then(res => {
    console.log("寫入結果:", res);
  })
  .catch(err => {
    console.error("寫入失敗:", err);
  });

  closeModal();
}
</script>

</body>
</html>
